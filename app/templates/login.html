<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gewichtsverlauf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0f172a; }</style>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-slate-800 p-8 rounded-xl border border-slate-700 w-full max-w-md">
        <h1 class="text-2xl font-bold text-white mb-6 text-center">Gewichtsverlauf</h1>

        {% if error %}
        <div class="bg-red-900/50 border border-red-700 text-red-200 px-4 py-3 rounded-lg mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <label class="block text-sm font-medium text-gray-400 mb-2">Zugangs-Token</label>
            <input
                type="text"
                name="token"
                placeholder="Token eingeben..."
                class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 mb-4"
                required
            >
            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition"
            >
                Anmelden
            </button>
        </form>

        <p class="text-gray-500 text-sm text-center mt-6">
            Du benoetigst einen Token um die Daten zu sehen.
        </p>
    </div>
</body>
</html>
